<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Yuchen Fan · Content Studio</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f5f5; color: #222;
    }
    #gate { width: 100%; max-width: 300px; padding: 28px 24px; text-align: center; }
    .visually-hidden {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }
    #gate input {
      width: 100%; box-sizing: border-box; padding: 10px 12px;
      font-size: 16px; border: 1px solid #ccc; border-radius: 8px; outline: none;
    }
    #gate input:focus { border-color: #2563eb; }
    #gate button {
      margin-top: 12px; width: 100%; padding: 10px; font-size: 16px;
      border: 0; border-radius: 8px; background: #2563eb; color: #fff; cursor: pointer;
    }
    #gate button:hover { background: #1d4ed8; }
    #gate .err { color: #dc2626; margin-top: 10px; font-size: 14px; min-height: 1.2em; }
    #loading { color: #888; }
  </style>
</head>
<body>
  <!--
    编辑后台（Sveltia CMS）密码门。
    注意：这是前端软门（看源码可绕），真正的写权限靠 Sveltia 登录时的 GitHub 令牌。
    换密码：本地执行  printf '%s' "你的密码" | shasum -a 256 ，把输出第一段填进下面的 PASSWORD_HASH。
    解锁状态用 localStorage 永久记住（为了「设好一次、以后零输入」）；想在某设备上重新要求输密码，清掉该站点的 localStorage 即可。
  -->
  <div id="gate">
    <form id="pw-form" autocomplete="off">
      <label class="visually-hidden" for="pw">编辑后台密码</label>
      <input id="pw" type="password" placeholder="密码" autofocus />
      <button type="submit">进入</button>
      <p class="err" id="err"></p>
    </form>
  </div>
  <div id="loading" style="display:none;">加载编辑器…</div>

  <script>
  (function () {
    // 进入密码的 SHA-256（换密码见文件顶部注释）
    var PASSWORD_HASH = "69fad9ee09b17ac0120fbb1e6f5110a78afa37c8f2da987cbd567fc50b29377b";

    var booted = false;
    var gate = document.getElementById('gate');
    var loading = document.getElementById('loading');
    var form = document.getElementById('pw-form');
    var pw = document.getElementById('pw');
    var err = document.getElementById('err');

    function sha256(str) {
      var buf = new TextEncoder().encode(str);
      return crypto.subtle.digest('SHA-256', buf).then(function (hash) {
        return Array.prototype.map.call(new Uint8Array(hash), function (b) {
          return ('0' + b.toString(16)).slice(-2);
        }).join('');
      });
    }

    function boot() {
      if (booted) return;
      booted = true;
      localStorage.setItem('edit-unlocked', '1'); // 永久记住，下次不再问密码
      gate.style.display = 'none';
      loading.style.display = 'block';
      var s = document.createElement('script');
      s.src = 'https://unpkg.com/@sveltia/cms@0.167.3/dist/sveltia-cms.js';
      s.integrity = 'sha384-DX22AUN63JgB03kV9ws5yc1Y+4BGEnuS4ReIZARbhovo2KWjGUXMw6M3LXMmZB3v';
      s.crossOrigin = 'anonymous';
      document.body.appendChild(s);
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      err.textContent = '';
      var h = await sha256(pw.value);
      if (h === PASSWORD_HASH) {
        boot();
      } else {
        err.textContent = '密码不对';
        pw.value = '';
        pw.focus();
      }
    });

    // 该设备已解锁过则直接进（永久记住，除非手动清 localStorage）
    if (localStorage.getItem('edit-unlocked') === '1') {
      boot();
    }
  })();
  </script>
</body>
</html>
